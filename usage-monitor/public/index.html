<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Usage Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Claude Code + Codex</p>
          <h1>Usage Monitor</h1>
        </div>
        <div class="controls">
          <select id="rangeSelect" aria-label="时间范围">
            <option value="7">近 7 天</option>
            <option value="30" selected>近 30 天</option>
            <option value="90">近 90 天</option>
          </select>
          <button id="refreshBtn" type="button">刷新</button>
        </div>
      </header>

      <section class="metric-grid" aria-label="概览">
        <article class="metric">
          <span>Sessions</span>
          <strong id="sessionsMetric">-</strong>
        </article>
        <article class="metric">
          <span>Total Tokens</span>
          <strong id="tokensMetric">-</strong>
        </article>
        <article class="metric">
          <span>Cached Input</span>
          <strong id="cacheMetric">-</strong>
        </article>
        <article class="metric">
          <span>Estimated Cost</span>
          <strong id="costMetric">-</strong>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Daily Tokens</h2>
          <span id="generatedAt">-</span>
        </div>
        <div id="dailyChart" class="daily-chart" role="img" aria-label="按天统计 token"></div>
      </section>

      <section class="content-grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Providers</h2>
          </div>
          <div id="providerList" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Models</h2>
          </div>
          <div id="modelTable" class="table"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Recent Sessions</h2>
          <span>只展示元数据和用量，不展示对话内容</span>
        </div>
        <div id="sessionList" class="session-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Sources</h2>
        </div>
        <div id="sourceList" class="source-list"></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
