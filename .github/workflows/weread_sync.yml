name: WeRead Sync

on:
  schedule:
    - cron: '13 1-15 * * *'  # 每小时，北京时间 9:13-23:13（UTC 1-15）
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run WeRead sync
        run: python sync/sync_weread.py
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CLOUD_BASE_URL: ${{ secrets.CLOUD_BASE_URL }}
