name: WeRead Sync

on:
  repository_dispatch:
    types: [weread-sync]   # 外部 cron 服务通过 API 触发
  workflow_dispatch:       # 保留手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run WeRead sync
        run: python sync/sync_weread.py
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CLOUD_BASE_URL: ${{ secrets.CLOUD_BASE_URL }}
