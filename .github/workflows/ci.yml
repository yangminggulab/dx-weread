name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Server smoke check
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, 'web')
          from routes.api import handle_request

          status_code, data = handle_request('GET', '/api/weread/status', None)
          assert status_code == 200, f"Expected 200, got {status_code}: {data}"

          status_code, data = handle_request('GET', '/api/nonexistent', None)
          assert status_code == 404, f"Expected 404, got {status_code}"

          print("Smoke checks passed.")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm --prefix worker install

      - name: Worker syntax check
        run: npm --prefix worker run check:worker
