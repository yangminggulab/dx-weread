name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Flask smoke check
        run: |
          python - <<'PY'
          import server

          client = server.app.test_client()

          home = client.get("/")
          status = client.get("/api/weread/status")

          assert home.status_code == 200, home.status_code
          assert status.status_code == 200, status.status_code
          print("Flask smoke checks passed.")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Chrome extension syntax check
        run: |
          node --check chrome-extension/weread-sync/background.js
          node --check chrome-extension/weread-sync/popup.js
